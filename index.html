<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Busy Littles</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#7C3AED;--brand2:#A78BFA;--bl:#F5F3FF;
  --bg:#fff;--bg2:#f8f9fa;--bg3:#f3f4f8;
  --tx:#1a1a2e;--tx2:#6b7280;--tx3:#9ca3af;
  --bd:rgba(0,0,0,.09);--bd2:rgba(0,0,0,.16);
  --r:10px;--rl:14px;
  --dbg:#fef2f2;--dbd:#fecaca;--dtx:#dc2626;
  --sbg:#f0fdf4;--sbd:#bbf7d0;--stx:#16a34a;
  --wbg:#fffbeb;--wbd:#fde68a;--wtx:#92400e;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1625;--bg2:#241e35;--bg3:#120f1e;
  --tx:#e2e8f0;--tx2:#94a3b8;--tx3:#64748b;
  --bd:rgba(255,255,255,.09);--bd2:rgba(255,255,255,.16);
  --bl:#1e1535;--dbg:#3b1a1a;--dbd:#7f1d1d;--dtx:#f87171;
  --sbg:#1a2e1e;--sbd:#166534;--stx:#4ade80;
  --wbg:#2a1f0a;--wbd:#92400e;--wtx:#fbbf24;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--tx);min-height:100vh}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg3)}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* HEADER */
.hdr{background:var(--bg);border-bottom:1px solid var(--bd);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-name{font-size:16px;font-weight:800;color:var(--tx)}
.logo-name span{color:var(--brand)}
.logo-sub{font-size:11px;color:var(--tx3);margin-top:1px}

/* TABS */
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--bd);position:sticky;top:62px;z-index:19}
.tab{flex:1;padding:11px 4px 9px;text-align:center;font-size:11px;font-weight:600;color:var(--tx3);cursor:pointer;border-bottom:2.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab i{font-size:19px}
.tab.on{color:var(--brand);border-bottom-color:var(--brand)}

/* VIEW SWITCHER */
.view-sw{display:flex;background:var(--bg2);border-radius:var(--r);padding:3px;gap:2px;margin-bottom:12px}
.view-btn{flex:1;padding:7px 4px;border-radius:7px;border:none;background:none;font-size:13px;font-weight:600;color:var(--tx3);cursor:pointer;transition:all .2s}
.view-btn.on{background:var(--bg);color:var(--brand);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* BUTTONS */
button{background:var(--bg);border:1px solid var(--bd2);border-radius:var(--r);color:var(--tx);font-family:inherit;font-size:14px;cursor:pointer;padding:9px 14px;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s}
button:active{opacity:.75;transform:scale(.97)}
button.primary{background:var(--brand);color:#fff;border-color:transparent;font-weight:600}
button.ghost{border:none;padding:8px 4px;background:none;color:var(--tx2)}
button.danger{color:var(--dtx);border-color:var(--dbd);background:var(--dbg)}
button.sm{padding:6px 10px;font-size:12px;border-radius:7px}

.content{flex:1;padding:13px 16px;overflow-y:auto}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px}
.stat{background:var(--bg);border-radius:var(--r);padding:11px 8px;text-align:center;border:1px solid var(--bd)}
.stat-n{font-size:21px;font-weight:700;color:var(--brand)}
.stat-l{font-size:11px;color:var(--tx3);margin-top:1px}

/* BANNERS */
.banner{border-radius:var(--r);padding:10px 13px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;font-size:13px;line-height:1.4}
.bd{background:var(--dbg);border:1px solid var(--dbd);color:var(--dtx)}
.bi{background:var(--bl);border:1px solid var(--bd);color:var(--brand)}

/* CHILD PILLS */
.cpills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.cpill{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;border:1.5px solid var(--bd2);background:var(--bg);cursor:pointer;font-size:12px;font-weight:600;color:var(--tx2);white-space:nowrap}
.cpill.on{color:#fff;border-color:transparent}

/* DAY LIST (week view) */
.dlbl{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.7px;text-transform:uppercase;padding:9px 0 5px}
.dcard{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:5px}
.dempty{padding:12px 16px;font-size:13px;color:var(--tx3);display:flex;align-items:center;gap:6px}
.arow{display:flex;align-items:flex-start;gap:10px;padding:12px 15px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s}
.arow:last-child{border-bottom:none}
.arow:active{background:var(--bg2)}
.adot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ainfo{flex:1;min-width:0}
.aname{font-size:14px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.atime{font-size:12px;color:var(--tx2);margin-top:2px}
.ameta{font-size:11px;color:var(--tx3);margin-top:2px}
.atags{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:4px}
.atag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600}
.atag-tent{background:var(--wbg);color:var(--wtx)}
.atag-child{color:#fff}
.atag-conf{background:var(--dbg);color:var(--dtx)}
.chev{color:var(--tx3);font-size:15px;flex-shrink:0;margin-top:2px}

/* MONTH VIEW */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.month-nav button{padding:6px 10px;border-radius:8px}
.month-title{font-size:15px;font-weight:700;color:var(--tx)}
.cal-grid{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-hdr div{text-align:center;padding:8px 2px;font-size:11px;font-weight:700;color:var(--tx3);border-bottom:1px solid var(--bd)}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:52px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:4px 3px;cursor:pointer;transition:background .15s;position:relative}
.cal-day:nth-child(7n){border-right:none}
.cal-day:hover{background:var(--bg2)}
.cal-day.other-month{opacity:.35}
.cal-day.today .cal-dn{background:var(--brand);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 2px}
.cal-dn{font-size:12px;font-weight:600;color:var(--tx);text-align:center;margin-bottom:2px}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-popup{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-top:10px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.cal-popup-title{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--tx)}

/* TERM VIEW */
.term-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.term-title{font-size:15px;font-weight:700;color:var(--tx)}
.term-badge{font-size:11px;background:var(--bl);color:var(--brand);padding:3px 8px;border-radius:20px;font-weight:700}
.week-row{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:11px 13px;margin-bottom:6px;cursor:pointer;transition:background .15s}
.week-row:active{background:var(--bg2)}
.week-row.holiday{background:var(--bg2);opacity:.7}
.week-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.week-lbl{font-size:12px;font-weight:700;color:var(--tx)}
.week-dates{font-size:11px;color:var(--tx3)}
.week-days{display:flex;gap:4px;flex-wrap:wrap}
.wd-chip{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:600;display:flex;align-items:center;gap:3px}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--tx3)}
.empty i{font-size:48px;display:block;margin-bottom:12px}
.empty h3{font-size:16px;color:var(--tx2);margin-bottom:6px;font-weight:700}
.empty p{font-size:13px;line-height:1.6}
.empty strong{color:var(--brand)}

/* FORM */
.fhdr{background:var(--bg);border-bottom:1px solid var(--bd);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.fbody{flex:1;padding:16px;overflow-y:auto;padding-bottom:32px}
label{display:block;font-size:12px;font-weight:600;color:var(--tx2);margin-top:16px;margin-bottom:5px;letter-spacing:.2px}
label:first-of-type{margin-top:0}
input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--bd2);border-radius:var(--r);font-family:inherit;font-size:15px;color:var(--tx);background:var(--bg)}
textarea{resize:none;height:66px;line-height:1.5}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.err{font-size:12px;color:var(--dtx);margin-top:4px;display:none}
.col-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:7px}
.copt{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:.15s}
.copt.on{border-color:var(--tx)}
.factions{display:flex;gap:8px;margin-top:20px}
.factions button{flex:1;padding:12px;font-size:15px;justify-content:center;border-radius:var(--r)}

/* SLOT CARDS */
.slot-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-top:8px;position:relative}
.slot-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.slot-lbl{font-size:12px;font-weight:700;color:var(--tx2)}
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.slot-full{grid-column:1/-1}
.slot-time-row{display:flex;gap:6px;align-items:center}
.slot-time-row input{flex:1;padding:9px 10px;font-size:14px}
.slot-sep{font-size:13px;color:var(--tx3);flex-shrink:0}
.add-slot-btn{width:100%;margin-top:8px;padding:10px;justify-content:center;border-style:dashed;color:var(--tx2)}
.sect-title{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-top:20px;margin-bottom:8px}
</style>
</head>
<body>
<div class="app">

<!-- ═══ MAIN ═══ -->
<div class="screen active" id="s-main">
  <div class="hdr">
    <div class="logo">
      <div class="logo-icon">🌟</div>
      <div>
        <div class="logo-name">Busy <span>Littles</span></div>
        <div class="logo-sub">Weekly activity planner</div>
      </div>
    </div>
    <button class="primary" onclick="openAdd()"><i class="ti ti-plus"></i>Add</button>
  </div>
  <div class="tabs">
    <div class="tab on" id="tab-sched" onclick="switchTab('sched')"><i class="ti ti-calendar-week"></i>Schedule</div>
    <div class="tab" id="tab-kids" onclick="switchTab('kids')"><i class="ti ti-users"></i>Children</div>
    <div class="tab" id="tab-export" onclick="switchTab('export')"><i class="ti ti-calendar-share"></i>Export</div>
  </div>
  <div class="content" id="pane-sched"></div>
  <div class="content" id="pane-kids" style="display:none"></div>
  <div class="content" id="pane-export" style="display:none"></div>
</div>

<!-- ═══ ACTIVITY FORM ═══ -->
<div class="screen" id="s-form">
  <div class="fhdr">
    <button class="ghost" onclick="goMain()"><i class="ti ti-arrow-left"></i>Back</button>
    <span id="ftitle" style="font-size:15px;font-weight:700"></span>
    <div style="width:60px"></div>
  </div>
  <div class="fbody">
    <label for="fn">Activity name</label>
    <input id="fn" type="text" placeholder="e.g. Basketball, Piano, Swimming">
    <div class="err" id="en">Please enter a name</div>

    <label>Child</label>
    <div id="fcp" style="display:flex;gap:7px;flex-wrap:wrap;margin-top:5px"></div>
    <div class="err" id="ec">Please select a child</div>

    <div class="sect-title">📅 Session Times</div>
    <div id="slots-container"></div>
    <button class="add-slot-btn" onclick="addFormSlot()"><i class="ti ti-plus"></i>Add another session time</button>
    <div class="err" id="es">Please add at least one session time</div>

    <label for="fl">Location <span style="font-weight:400;color:var(--tx3)">(optional)</span></label>
    <input id="fl" type="text" placeholder="e.g. Community Sports Centre">

    <label for="fpu">🚗 Pickup note <span style="font-weight:400;color:var(--tx3)">(optional)</span></label>
    <input id="fpu" type="text" placeholder="e.g. Pick up at 4:20pm from front gate">

    <label for="fdo">📍 Dropoff note <span style="font-weight:400;color:var(--tx3)">(optional)</span></label>
    <input id="fdo" type="text" placeholder="e.g. Drop at 3:50pm, park on Main St">

    <label for="fnt">Notes <span style="font-weight:400;color:var(--tx3)">(optional)</span></label>
    <textarea id="fnt" placeholder="e.g. Bring towel and goggles"></textarea>

    <div class="factions">
      <button class="danger" id="del-btn" onclick="deleteAct()" style="display:none;flex:.6"><i class="ti ti-trash"></i>Delete</button>
      <button class="primary" onclick="saveAct()"><i class="ti ti-check"></i>Save</button>
    </div>
  </div>
</div>

<!-- ═══ CHILD FORM ═══ -->
<div class="screen" id="s-child">
  <div class="fhdr">
    <button class="ghost" onclick="goMain()"><i class="ti ti-arrow-left"></i>Back</button>
    <span id="cftitle" style="font-size:15px;font-weight:700"></span>
    <div style="width:60px"></div>
  </div>
  <div class="fbody">
    <label for="cfn">Child's name</label>
    <input id="cfn" type="text" placeholder="e.g. Emma">
    <div class="err" id="ecfn">Please enter a name</div>
    <label>Colour</label>
    <div class="col-row" id="ccr"></div>
    <div class="factions">
      <button class="danger" id="delc-btn" onclick="deleteChild()" style="display:none;flex:.6"><i class="ti ti-trash"></i>Remove</button>
      <button class="primary" onclick="saveChild()"><i class="ti ti-check"></i>Save</button>
    </div>
  </div>
</div>

</div><!-- .app -->

<script>
// ═══ CONSTANTS ═══
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAYSH=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const CCOLS=[
  {id:'purple',dot:'#7C3AED'},{id:'pink',dot:'#D4537E'},
  {id:'blue',dot:'#378ADD'},{id:'teal',dot:'#1D9E75'},
  {id:'orange',dot:'#EA6C2C'},{id:'amber',dot:'#B45309'},
  {id:'red',dot:'#DC2626'},{id:'green',dot:'#16A34A'},
];

// Vic school terms (approximate)
const TERMS_BY_YEAR = {
  2025:[
    {t:1,label:'Term 1 2025',s:'2025-01-28',e:'2025-04-11'},
    {t:2,label:'Term 2 2025',s:'2025-04-28',e:'2025-06-27'},
    {t:3,label:'Term 3 2025',s:'2025-07-14',e:'2025-09-19'},
    {t:4,label:'Term 4 2025',s:'2025-10-06',e:'2025-12-19'},
  ],
  2026:[
    {t:1,label:'Term 1 2026',s:'2026-01-27',e:'2026-04-09'},
    {t:2,label:'Term 2 2026',s:'2026-04-27',e:'2026-06-26'},
    {t:3,label:'Term 3 2026',s:'2026-07-13',e:'2026-09-18'},
    {t:4,label:'Term 4 2026',s:'2026-10-05',e:'2026-12-18'},
  ],
};
const ALL_TERMS = [...(TERMS_BY_YEAR[2025]||[]),...(TERMS_BY_YEAR[2026]||[])];

// ═══ STATE ═══
let children = JSON.parse(localStorage.getItem('bl_ch_v2')||'null') || [
  {id:'c1',name:'Emma',color:'purple'},
  {id:'c2',name:'Liam',color:'blue'},
];
let acts = migrateActs(JSON.parse(localStorage.getItem('bl_ac_v2')||'[]'));
let filterChild='all', activeTab='sched', currentView='week';
let currentMonth = new Date(); currentMonth.setDate(1);
let currentTermIdx = getCurrentTermIdx();
let selMonthDay = null;
let formSlots=[], formChildId=null, editActId=null;
let editChildId=null, selChildCol='purple';

// ═══ MIGRATE old single-slot format ═══
function migrateActs(raw){
  return raw.map(a=>{
    if(a.slots) return a;
    return {id:a.id,name:a.name||'',childId:a.childId||children[0]?.id,
      loc:a.loc||'',pickup:a.pickup||'',dropoff:a.dropoff||'',note:a.note||'',
      slots:[{id:'s'+Date.now()+Math.random(),day:a.day||'Monday',start:a.start||'15:00',end:a.end||'17:00',label:'',active:true,tentative:false}]
    };
  });
}

function persist(){
  localStorage.setItem('bl_ch_v2',JSON.stringify(children));
  localStorage.setItem('bl_ac_v2',JSON.stringify(acts));
}

// ═══ HELPERS ═══
const toM=t=>{const[h,m]=t.split(':').map(Number);return h*60+m};
const fmt=t=>{const[h,m]=t.split(':').map(Number);const ap=h>=12?'pm':'am';const hh=h>12?h-12:h===0?12:h;return `${hh}:${String(m).padStart(2,'0')}${ap}`};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const gc=id=>children.find(c=>c.id===id);
const gcol=id=>CCOLS.find(c=>c.id===id)||CCOLS[0];
const uid=()=>'s'+Date.now()+Math.floor(Math.random()*9999);

function getCurrentTermIdx(){
  const now=new Date();
  for(let i=0;i<ALL_TERMS.length;i++){
    if(now>=new Date(ALL_TERMS[i].s)&&now<=new Date(ALL_TERMS[i].e)) return i;
  }
  // find next upcoming
  for(let i=0;i<ALL_TERMS.length;i++){
    if(now<new Date(ALL_TERMS[i].s)) return i;
  }
  return ALL_TERMS.length-1;
}

function conflicts(){
  const bad=new Set();
  DAYS.forEach(day=>{
    // collect all active slots for each child on this day
    const byChild={};
    acts.forEach(act=>{
      act.slots.filter(s=>s.active&&s.day===day).forEach(s=>{
        (byChild[act.childId]=byChild[act.childId]||[]).push({act,slot:s});
      });
    });
    Object.values(byChild).forEach(list=>{
      for(let i=0;i<list.length;i++) for(let j=i+1;j<list.length;j++){
        const a=list[i].slot,b=list[j].slot;
        if(toM(a.start)<toM(b.end)&&toM(b.start)<toM(a.end)){
          bad.add(list[i].act.id+'_'+list[i].slot.id);
          bad.add(list[j].act.id+'_'+list[j].slot.id);
        }
      }
    });
  });
  return bad;
}

// ═══ NAVIGATION ═══
function switchTab(t){
  activeTab=t;
  ['sched','kids','export'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('on',x===t);
    document.getElementById('pane-'+x).style.display=x===t?'block':'none';
  });
  if(t==='sched') renderSched();
  if(t==='kids') renderKids();
  if(t==='export') renderExport();
}
function goMain(){
  ['s-form','s-child'].forEach(s=>document.getElementById(s).classList.remove('active'));
  document.getElementById('s-main').classList.add('active');
  if(activeTab==='sched') renderSched();
  if(activeTab==='kids') renderKids();
}

// ═══ SCHEDULE TAB ═══
function renderSched(){
  const el=document.getElementById('pane-sched');
  let h='';
  // View switcher
  h+=`<div class="view-sw">
    <button class="view-btn ${currentView==='week'?'on':''}" onclick="setView('week')">Week</button>
    <button class="view-btn ${currentView==='month'?'on':''}" onclick="setView('month')">Month</button>
    <button class="view-btn ${currentView==='term'?'on':''}" onclick="setView('term')">Term</button>
  </div>`;
  // Child filter pills
  h+=`<div class="cpills">
    <div class="cpill ${filterChild==='all'?'on':''}" style="${filterChild==='all'?'background:var(--brand);border-color:var(--brand)':''}" onclick="setFilter('all')">All</div>`;
  children.forEach(c=>{
    const col=gcol(c.color);
    const on=filterChild===c.id;
    h+=`<div class="cpill ${on?'on':''}" style="${on?`background:${col.dot};border-color:${col.dot}`:''}" onclick="setFilter('${c.id}')">
      <div style="width:7px;height:7px;border-radius:50%;background:${col.dot};${on?'background:#fff':''}"></div>${esc(c.name)}
    </div>`;
  });
  h+=`</div>`;

  if(currentView==='week') h+=renderWeek();
  else if(currentView==='month') h+=renderMonth();
  else h+=renderTerm();
  el.innerHTML=h;
}

// ── WEEK VIEW ──
function renderWeek(){
  const bad=conflicts();
  const filtered=filterChild==='all'?acts:acts.filter(a=>a.childId===filterChild);
  const activeSlots=filtered.flatMap(a=>a.slots.filter(s=>s.active).map(s=>({act:a,slot:s})));
  const totalH=activeSlots.reduce((s,{slot})=>s+(toM(slot.end)-toM(slot.start)),0)/60;
  let h='';
  // Stats
  h+=`<div class="stats">
    <div class="stat"><div class="stat-n">${filtered.length}</div><div class="stat-l">Activities</div></div>
    <div class="stat"><div class="stat-n">${new Set(activeSlots.map(x=>x.slot.day)).size}</div><div class="stat-l">Active days</div></div>
    <div class="stat"><div class="stat-n">${Math.round(totalH*10)/10}h</div><div class="stat-l">Per week</div></div>
  </div>`;
  // Conflicts
  const confActs=new Set([...bad].map(k=>k.split('_')[0]));
  if(confActs.size){const n=confActs.size;h+=`<div class="banner bd"><i class="ti ti-alert-triangle" style="font-size:17px;flex-shrink:0;margin-top:1px"></i><span>${n} conflict${n>1?'s':''} detected — tap to fix</span></div>`;}

  if(!filtered.length){
    return h+`<div class="empty"><i class="ti ti-calendar-plus"></i><h3>No activities yet</h3><p>Tap <strong>Add</strong> to build your schedule</p></div>`;
  }
  DAYS.forEach(day=>{
    const daySlots=activeSlots.filter(x=>x.slot.day===day).sort((a,b)=>toM(a.slot.start)-toM(b.slot.start));
    h+=`<div class="dlbl">${day}</div><div class="dcard">`;
    if(!daySlots.length){h+=`<div class="dempty"><i class="ti ti-moon"></i>Free day</div>`;}
    else {
      daySlots.forEach(({act,slot})=>{
        const child=gc(act.childId);
        const col=gcol(child?.color);
        const key=act.id+'_'+slot.id;
        const isB=bad.has(key);
        const multSlots=act.slots.filter(s=>s.active).length>1;
        h+=`<div class="arow" onclick="openEdit('${act.id}')" style="${isB?'background:var(--dbg)':''}">
          <div class="adot" style="background:${isB?'#DC2626':col.dot}"></div>
          <div class="ainfo">
            <div class="aname">${esc(act.name)}</div>
            <div class="atime">${fmt(slot.start)} – ${fmt(slot.end)}${act.loc?' · '+esc(act.loc):''}</div>
            ${slot.label?`<div class="ameta">📌 ${esc(slot.label)}</div>`:''}
            ${act.pickup?`<div class="ameta">🚗 ${esc(act.pickup)}</div>`:''}
            <div class="atags">
              ${slot.tentative?`<span class="atag atag-tent">⚠️ Tentative</span>`:''}
              ${multSlots?`<span class="atag" style="background:var(--bl);color:var(--brand)">${act.slots.filter(s=>s.active).length} sessions</span>`:''}
              ${filterChild==='all'&&child?`<span class="atag atag-child" style="background:${col.dot}">${esc(child.name)}</span>`:''}
              ${isB?`<span class="atag atag-conf"><i class="ti ti-alert-triangle"></i> Clash</span>`:''}
            </div>
          </div>
          <i class="ti ti-chevron-right chev"></i>
        </div>`;
      });
    }
    h+=`</div>`;
  });
  return h;
}

// ── MONTH VIEW ──
function renderMonth(){
  const y=currentMonth.getFullYear(), mo=currentMonth.getMonth();
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const filtered=filterChild==='all'?acts:acts.filter(a=>a.childId===filterChild);

  // Build activity map by day-of-week
  const byDow={};
  filtered.forEach(act=>{
    act.slots.filter(s=>s.active).forEach(s=>{
      const dow=DAYS.indexOf(s.day); // 0=Mon..6=Sun
      (byDow[dow]=byDow[dow]||[]).push({act,slot:s});
    });
  });

  // Calendar grid
  const firstDay=new Date(y,mo,1);
  let startDow=firstDay.getDay()-1; if(startDow<0) startDow=6; // Mon=0
  const daysInMonth=new Date(y,mo+1,0).getDate();
  const today=new Date();

  let h=`<div class="month-nav">
    <button onclick="prevMonth()"><i class="ti ti-chevron-left"></i></button>
    <span class="month-title">${monthNames[mo]} ${y}</span>
    <button onclick="nextMonth()"><i class="ti ti-chevron-right"></i></button>
  </div>
  <div class="cal-grid">
    <div class="cal-hdr">${DAYSH.map(d=>`<div>${d}</div>`).join('')}</div>
    <div class="cal-body">`;

  // Empty cells before month starts
  for(let i=0;i<startDow;i++) h+=`<div class="cal-day other-month"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(y,mo,d);
    const dow=(date.getDay()+6)%7; // Mon=0
    const isToday=date.toDateString()===today.toDateString();
    const isSel=selMonthDay===d;
    const dayActs=byDow[dow]||[];
    h+=`<div class="cal-day${isToday?' today':''}${isSel?' on':''}" onclick="selectMonthDay(${d})" style="${isSel?'background:var(--bl)':''}">
      <div class="cal-dn">${d}</div>
      <div class="cal-dots">`;
    const seen=new Set();
    dayActs.forEach(({act})=>{
      const col=gcol(gc(act.childId)?.color);
      if(!seen.has(act.id)){h+=`<div class="cal-dot" style="background:${col.dot}"></div>`;seen.add(act.id);}
    });
    h+=`</div></div>`;
  }
  // Fill remaining
  const total=startDow+daysInMonth;
  const rem=(7-total%7)%7;
  for(let i=0;i<rem;i++) h+=`<div class="cal-day other-month"></div>`;
  h+=`</div></div>`;

  // Day detail popup
  if(selMonthDay){
    const date=new Date(y,mo,selMonthDay);
    const dow=(date.getDay()+6)%7;
    const dayActs=(byDow[dow]||[]).sort((a,b)=>toM(a.slot.start)-toM(b.slot.start));
    h+=`<div class="cal-popup"><div class="cal-popup-title">${monthNames[mo]} ${selMonthDay}</div>`;
    if(!dayActs.length){h+=`<div style="font-size:13px;color:var(--tx3)">No activities this day</div>`;}
    else{
      dayActs.forEach(({act,slot})=>{
        const child=gc(act.childId);
        const col=gcol(child?.color);
        h+=`<div class="arow" onclick="openEdit('${act.id}')" style="padding:10px 0;border-bottom:1px solid var(--bd)">
          <div class="adot" style="background:${col.dot}"></div>
          <div class="ainfo">
            <div class="aname">${esc(act.name)}${slot.label?` <span style="font-size:11px;color:var(--tx3)">· ${esc(slot.label)}</span>`:''}</div>
            <div class="atime">${fmt(slot.start)} – ${fmt(slot.end)}${act.loc?' · '+esc(act.loc):''}</div>
            ${act.pickup?`<div class="ameta">🚗 ${esc(act.pickup)}</div>`:''}
          </div>
          ${child&&filterChild==='all'?`<span class="atag atag-child" style="background:${col.dot};flex-shrink:0">${esc(child.name)}</span>`:''}
        </div>`;
      });
    }
    h+=`</div>`;
  }
  return h;
}

// ── TERM VIEW ──
function renderTerm(){
  const term=ALL_TERMS[currentTermIdx];
  if(!term) return '<div class="empty"><i class="ti ti-calendar-x"></i><h3>No term data</h3></div>';
  const filtered=filterChild==='all'?acts:acts.filter(a=>a.childId===filterChild);

  let h=`<div class="term-nav">
    <button onclick="prevTerm()" ${currentTermIdx<=0?'disabled':''}><i class="ti ti-chevron-left"></i></button>
    <div style="text-align:center">
      <div class="term-title">Term ${term.t}</div>
      <div style="font-size:11px;color:var(--tx3);margin-top:2px">${fmtDate(term.s)} – ${fmtDate(term.e)}</div>
    </div>
    <button onclick="nextTerm()" ${currentTermIdx>=ALL_TERMS.length-1?'disabled':''}><i class="ti ti-chevron-right"></i></button>
  </div>`;

  // Summary banner
  const activeSlots=filtered.flatMap(a=>a.slots.filter(s=>s.active));
  if(activeSlots.length){
    const totalH=activeSlots.reduce((s,sl)=>s+(toM(sl.end)-toM(sl.start)),0)/60;
    const termWeeks=Math.round((new Date(term.e)-new Date(term.s))/(7*24*3600*1000));
    h+=`<div class="banner bi"><i class="ti ti-info-circle" style="flex-shrink:0"></i>
      <span>~${termWeeks} weeks · ${(totalH*termWeeks).toFixed(0)}h total activity time this term</span></div>`;
  }

  // Week by week
  const termStart=new Date(term.s), termEnd=new Date(term.e);
  let weekStart=new Date(termStart);
  // go to Monday
  const dow=weekStart.getDay(); const diff=dow===0?-6:1-dow;
  weekStart.setDate(weekStart.getDate()+diff);
  let wk=1;
  while(weekStart<=termEnd){
    const weekEnd=new Date(weekStart); weekEnd.setDate(weekEnd.getDate()+6);
    const inTerm=weekStart<=termEnd&&weekEnd>=termStart;
    if(inTerm){
      // Which days this week have activities?
      const daySlots={};
      DAYS.forEach((day,di)=>{
        const slotMatches=filtered.flatMap(a=>a.slots.filter(s=>s.active&&s.day===day).map(s=>({act:a,slot:s})));
        if(slotMatches.length) daySlots[day]=slotMatches;
      });
      h+=`<div class="week-row" onclick="">
        <div class="week-row-top">
          <span class="week-lbl">Week ${wk}</span>
          <span class="week-dates">${fmtDateShort(weekStart)} – ${fmtDateShort(weekEnd)}</span>
        </div>
        <div class="week-days">`;
      if(Object.keys(daySlots).length===0){
        h+=`<span style="font-size:12px;color:var(--tx3)">No activities scheduled</span>`;
      } else {
        Object.entries(daySlots).forEach(([day,slotList])=>{
          const names=[...new Set(slotList.map(x=>x.act.name))];
          const col=gcol(gc(slotList[0].act.childId)?.color);
          h+=`<div class="wd-chip" style="background:${col.dot}22;color:${col.dot}">
            <div style="width:6px;height:6px;border-radius:50%;background:${col.dot}"></div>
            ${day.slice(0,3)} · ${names.join(', ')}
          </div>`;
        });
      }
      h+=`</div></div>`;
      wk++;
    }
    weekStart.setDate(weekStart.getDate()+7);
  }
  return h;
}

function exportICS(cf){
  const toExport=cf==='all'?acts:acts.filter(a=>a.childId===cf);
  if(!toExport.length){alert('No activities to export!');return;}
  const now=new Date().toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z';
  const dayIdx={Monday:1,Tuesday:2,Wednesday:3,Thursday:4,Friday:5,Saturday:6,Sunday:0};
  const today=new Date();
  function nextDate(dayName){const t=dayIdx[dayName];const d=new Date(today);const df=(t-d.getDay()+7)%7;d.setDate(d.getDate()+(df===0?7:df));return d;}
  function dtStr(dayName,time){const b=nextDate(dayName);const[h,m]=time.split(':').map(Number);b.setHours(h,m,0,0);return b.toISOString().replace(/[-:.]/g,'').slice(0,15)+'Z';}
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//BusyLittles//EN','CALSCALE:GREGORIAN'];
  toExport.forEach(act=>{
    const cname=gc(act.childId)?.name||'';
    act.slots.filter(s=>s.active).forEach(slot=>{
      const desc=[act.pickup?'Pickup: '+act.pickup:'',act.dropoff?'Dropoff: '+act.dropoff:'',act.note?'Notes: '+act.note:'',slot.tentative?'⚠️ Tentative time':''].filter(Boolean).join('\\n');
      lines.push('BEGIN:VEVENT',`UID:bl-${act.id}-${slot.id}@busylittles`,`DTSTAMP:${now}`,
        `DTSTART:${dtStr(slot.day,slot.start)}`,`DTEND:${dtStr(slot.day,slot.end)}`,
        `SUMMARY:${cname?cname+': ':''}${act.name}${slot.label?' ('+slot.label+')':''}`,
        `LOCATION:${act.loc||''}`,desc?'DESCRIPTION:'+desc:'','RRULE:FREQ=WEEKLY','END:VEVENT');
    });
  });
  lines.push('END:VCALENDAR');
  const blob=new Blob([lines.filter(Boolean).join('\r\n')],{type:'text/calendar'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='busylittles.ics';a.click();URL.revokeObjectURL(url);
}

function saveAct(){
  const name=document.getElementById('fn').value.trim();

  document.getElementById('en').style.display=!name?'block':'none';if(!name)ok=false;
  document.getElementById('ec').style.display=!formChildId?'block':'none';if(!formChildId)ok=false;
  // Validate slot times
  let sErr=false;
  formSlots.forEach(s=>{if(!s.start||!s.end||toM(s.end)<=toM(s.start))sErr=true;});
  document.getElementById('es').style.display=sErr?'block':'none';if(sErr)ok=false;
  if(!ok)return;
  // Mark all slots active
  formSlots.forEach(s=>s.active=true);
  const obj={name,childId:formChildId,slots:[...formSlots],loc,pickup,dropoff,note};
  if(editActId){acts=acts.map(a=>a.id===editActId?{id:editActId,...obj}:a);}
  else{acts.push({id:'a'+Date.now(),...obj});}
  persist();goMain();
}

  if(!editChildId||children.length<=1)return;
  if(!confirm('Remove this child and all their activities?'))return;
  acts=acts.filter(a=>a.childId!==editChildId);
  children=children.filter(c=>c.id!==editChildId);
  persist();goMain();switchTab('kids');
}

renderSched();
