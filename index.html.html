<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Busy Littles — Weekly Activity Planner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #7C3AED;
      --brand2: #A78BFA;
      --brand-light: #F5F3FF;
      --bg: #ffffff; --bg2: #f8f9fa; --bg3: #f4f4f8;
      --text: #1a1a2e; --text2: #6b7280; --text3: #9ca3af;
      --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
      --radius: 10px; --radius-lg: 14px;
      --danger-bg: #fef2f2; --danger-border: #fecaca; --danger-text: #dc2626;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1625; --bg2: #241e35; --bg3: #120f1e;
        --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
        --border: rgba(255,255,255,0.09); --border2: rgba(255,255,255,0.16);
        --brand-light: #1e1535;
        --danger-bg: #3b1a1a; --danger-border: #7f1d1d; --danger-text: #f87171;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--bg3); }
    .screen { display: none; flex-direction: column; min-height: 100vh; }
    .screen.active { display: flex; }

    .hdr { background: var(--bg); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 38px; height: 38px; border-radius: 11px; background: var(--brand); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .logo-name { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -.4px; }
    .logo-name span { color: var(--brand); }
    .logo-tag { font-size: 11px; color: var(--text3); margin-top: 1px; }

    button { background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: inherit; font-size: 14px; cursor: pointer; padding: 9px 16px; display: inline-flex; align-items: center; gap: 5px; transition: opacity .15s; }
    button:active { opacity: .75; transform: scale(.97); }
    button.primary { background: var(--brand); color: #fff; border-color: transparent; font-weight: 600; }
    button.ghost { border: none; padding: 8px 0; background: none; color: var(--text2); }
    button.danger { color: var(--danger-text); border-color: var(--danger-border); background: var(--danger-bg); }

    .content { flex: 1; padding: 14px 16px; }

    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
    .stat { background: var(--bg); border-radius: var(--radius); padding: 12px 8px; text-align: center; border: 1px solid var(--border); }
    .stat-num { font-size: 22px; font-weight: 700; color: var(--brand); }
    .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }

    .banner { background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: var(--radius); padding: 11px 14px; margin-bottom: 14px; display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--danger-text); line-height: 1.4; }

    .day-lbl { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: .7px; text-transform: uppercase; padding: 10px 0 6px; }
    .day-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 6px; }
    .day-empty { padding: 13px 16px; font-size: 13px; color: var(--text3); display: flex; align-items: center; gap: 7px; }

    .act-row { display: flex; align-items: center; gap: 11px; padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
    .act-row:last-child { border-bottom: none; }
    .act-row:active { background: var(--bg2); }
    .act-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .act-info { flex: 1; min-width: 0; }
    .act-name { font-size: 14px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .act-time { font-size: 12px; color: var(--text2); margin-top: 3px; }
    .conflict-tag { font-size: 11px; color: var(--danger-text); background: var(--danger-bg); padding: 3px 8px; border-radius: 20px; flex-shrink: 0; white-space: nowrap; }

    .empty-state { text-align: center; padding: 52px 20px; color: var(--text3); }
    .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-state h3 { font-size: 17px; color: var(--text2); margin-bottom: 8px; font-weight: 700; }
    .empty-state p { font-size: 14px; line-height: 1.6; }
    .empty-state strong { color: var(--brand); }

    .form-body { flex: 1; padding: 18px 16px; overflow-y: auto; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-top: 18px; margin-bottom: 6px; letter-spacing: .2px; }
    label:first-of-type { margin-top: 0; }
    input, select { width: 100%; padding: 12px 13px; border: 1px solid var(--border2); border-radius: var(--radius); font-family: inherit; font-size: 15px; color: var(--text); background: var(--bg); }
    input:focus, select:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(124,58,237,.12); }
    .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .time-sub { display: flex; justify-content: space-between; margin-top: 5px; }
    .time-sub span { font-size: 11px; color: var(--text3); }
    .err { font-size: 12px; color: var(--danger-text); margin-top: 5px; display: none; }
    .color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    .c-opt { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: border-color .15s, transform .1s; }
    .c-opt:active { transform: scale(.9); }
    .c-opt.on { border-color: var(--text); }
    .form-actions { display: flex; gap: 8px; margin-top: 24px; padding-bottom: 24px; }
    .form-actions button { flex: 1; padding: 13px; font-size: 15px; justify-content: center; border-radius: var(--radius); }
  </style>
</head>
<body>
<div class="app">

  <!-- Schedule Screen -->
  <div class="screen active" id="s-schedule">
    <div class="hdr">
      <div class="logo">
        <div class="logo-icon">🌟</div>
        <div>
          <div class="logo-name">Busy <span>Littles</span></div>
          <div class="logo-tag">Weekly activity planner</div>
        </div>
      </div>
      <button class="primary" onclick="openAdd()"><i class="ti ti-plus"></i>Add</button>
    </div>
    <div class="content" id="sched-body"></div>
  </div>

  <!-- Add / Edit Screen -->
  <div class="screen" id="s-form">
    <div class="hdr">
      <button class="ghost" onclick="goSchedule()"><i class="ti ti-arrow-left"></i>Back</button>
      <span id="form-title" style="font-size:15px;font-weight:700">Add activity</span>
      <div style="width:60px"></div>
    </div>
    <div class="form-body">

      <label for="f-name">Activity name</label>
      <input id="f-name" type="text" placeholder="e.g. Basketball, Piano, Swimming">
      <div class="err" id="err-name">Please enter an activity name</div>

      <label for="f-child">Child's name</label>
      <input id="f-child" type="text" placeholder="e.g. Emma, Liam">

      <label for="f-day">Day of the week</label>
      <select id="f-day">
        <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
        <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
      </select>

      <label>Time</label>
      <div class="time-row">
        <input id="f-start" type="time" value="15:30">
        <input id="f-end"   type="time" value="17:00">
      </div>
      <div class="time-sub"><span>Start</span><span>End</span></div>
      <div class="err" id="err-time">End time must be after start time</div>

      <label for="f-loc">Location <span style="font-weight:400;color:var(--text3)">(optional)</span></label>
      <input id="f-loc" type="text" placeholder="e.g. Community Sports Centre">

      <label>Colour</label>
      <div class="color-row" id="color-row"></div>

      <div class="form-actions">
        <button class="danger" id="del-btn" onclick="deleteAct()" style="display:none;flex:0.6"><i class="ti ti-trash"></i>Delete</button>
        <button class="primary" onclick="saveAct()"><i class="ti ti-check"></i>Save</button>
      </div>
    </div>
  </div>

</div>
<script>
  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const COLS = [
    { id:'purple', dot:'#7C3AED' },
    { id:'pink',   dot:'#D4537E' },
    { id:'blue',   dot:'#378ADD' },
    { id:'teal',   dot:'#1D9E75' },
    { id:'orange', dot:'#EA6C2C' },
    { id:'amber',  dot:'#BA7517' },
  ];

  let acts = JSON.parse(localStorage.getItem('busylittles_v1') || '[]');
  let selCol = 'purple', editId = null;

  const toM  = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
  const fmt  = t => { const [h,m] = t.split(':').map(Number); const ap=h>=12?'pm':'am'; const hh=h>12?h-12:h===0?12:h; return `${hh}:${String(m).padStart(2,'0')}${ap}`; };
  const esc  = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const save = () => localStorage.setItem('busylittles_v1', JSON.stringify(acts));

  function conflicts() {
    const bad = new Set();
    DAYS.forEach(day => {
      const da = acts.filter(a => a.day === day);
      for (let i=0; i<da.length; i++)
        for (let j=i+1; j<da.length; j++) {
          const a=da[i], b=da[j];
          if (toM(a.start)<toM(b.end) && toM(b.start)<toM(a.end)) { bad.add(a.id); bad.add(b.id); }
        }
    });
    return bad;
  }

  function render() {
    const bad = conflicts();
    const totalH = acts.reduce((s,a) => s+(toM(a.end)-toM(a.start)), 0) / 60;
    let h = '';

    h += `<div class="stats">
      <div class="stat"><div class="stat-num">${acts.length}</div><div class="stat-lbl">Activities</div></div>
      <div class="stat"><div class="stat-num">${new Set(acts.map(a=>a.day)).size}</div><div class="stat-lbl">Active days</div></div>
      <div class="stat"><div class="stat-num">${Math.round(totalH*10)/10}h</div><div class="stat-lbl">Per week</div></div>
    </div>`;

    if (bad.size > 0) {
      const n = Math.ceil(bad.size/2);
      h += `<div class="banner">
        <i class="ti ti-alert-triangle" style="font-size:18px;flex-shrink:0;margin-top:1px"></i>
        <span>${n} time conflict${n>1?'s':''} detected — tap the highlighted activities to fix</span>
      </div>`;
    }

    if (!acts.length) {
      h += `<div class="empty-state">
        <div class="empty-icon">🌟</div>
        <h3>No activities yet!</h3>
        <p>Tap <strong>Add</strong> to start building<br>your weekly schedule</p>
      </div>`;
    } else {
      DAYS.forEach(day => {
        const da = acts.filter(a=>a.day===day).sort((a,b)=>toM(a.start)-toM(b.start));
        h += `<div class="day-lbl">${day}</div><div class="day-card">`;
        if (!da.length) {
          h += `<div class="day-empty"><i class="ti ti-moon"></i>Free day</div>`;
        } else {
          da.forEach(act => {
            const col = COLS.find(c=>c.id===act.color)||COLS[0];
            const isB = bad.has(act.id);
            h += `<div class="act-row" onclick="openEdit('${act.id}')" style="${isB?'background:var(--danger-bg)':''}">
              <div class="act-dot" style="background:${isB?'#E24B4A':col.dot}"></div>
              <div class="act-info">
                <div class="act-name">${esc(act.name)}${act.child?` <span style="font-size:11px;font-weight:500;color:var(--text2)">· ${esc(act.child)}</span>`:''}</div>
                <div class="act-time">${fmt(act.start)} – ${fmt(act.end)}${act.loc?' · '+esc(act.loc):''}</div>
              </div>
              ${isB
                ? '<span class="conflict-tag"><i class="ti ti-alert-triangle"></i> Clash!</span>'
                : '<i class="ti ti-chevron-right" style="color:var(--text3);font-size:16px"></i>'}
            </div>`;
          });
        }
        h += `</div>`;
      });
    }
    document.getElementById('sched-body').innerHTML = h;
  }

  function renderColors() {
    document.getElementById('color-row').innerHTML = COLS.map(c =>
      `<div class="c-opt ${selCol===c.id?'on':''}" style="background:${c.dot}" onclick="pickCol('${c.id}')"></div>`
    ).join('');
  }
  function pickCol(id) { selCol=id; renderColors(); }

  function goSchedule() {
    document.getElementById('s-form').classList.remove('active');
    document.getElementById('s-schedule').classList.add('active');
    render();
  }

  function openAdd() {
    editId=null;
    document.getElementById('form-title').textContent='Add activity';
    document.getElementById('f-name').value='';
    document.getElementById('f-child').value='';
    document.getElementById('f-day').value='Monday';
    document.getElementById('f-start').value='15:30';
    document.getElementById('f-end').value='17:00';
    document.getElementById('f-loc').value='';
    document.getElementById('del-btn').style.display='none';
    document.getElementById('err-name').style.display='none';
    document.getElementById('err-time').style.display='none';
    selCol='purple'; renderColors();
    document.getElementById('s-schedule').classList.remove('active');
    document.getElementById('s-form').classList.add('active');
    setTimeout(()=>document.getElementById('f-name').focus(), 100);
  }

  function openEdit(id) {
    const a = acts.find(x=>x.id===id); if(!a) return;
    editId=id;
    document.getElementById('form-title').textContent='Edit activity';
    document.getElementById('f-name').value=a.name;
    document.getElementById('f-child').value=a.child||'';
    document.getElementById('f-day').value=a.day;
    document.getElementById('f-start').value=a.start;
    document.getElementById('f-end').value=a.end;
    document.getElementById('f-loc').value=a.loc||'';
    document.getElementById('del-btn').style.display='';
    document.getElementById('err-name').style.display='none';
    document.getElementById('err-time').style.display='none';
    selCol=a.color||'purple'; renderColors();
    document.getElementById('s-schedule').classList.remove('active');
    document.getElementById('s-form').classList.add('active');
  }

  function saveAct() {
    const name  = document.getElementById('f-name').value.trim();
    const child = document.getElementById('f-child').value.trim();
    const day   = document.getElementById('f-day').value;
    const start = document.getElementById('f-start').value;
    const end   = document.getElementById('f-end').value;
    const loc   = document.getElementById('f-loc').value.trim();
    let ok = true;
    document.getElementById('err-name').style.display = !name?'block':'none';
    if (!name) ok=false;
    const timeErr = !start||!end||toM(end)<=toM(start);
    document.getElementById('err-time').style.display = timeErr?'block':'none';
    if (timeErr) ok=false;
    if (!ok) return;
    if (editId) {
      acts = acts.map(a => a.id===editId ? {...a,name,child,day,start,end,loc,color:selCol} : a);
    } else {
      acts.push({ id:'a'+Date.now(), name, child, day, start, end, loc, color:selCol });
    }
    save(); goSchedule();
  }

  function deleteAct() {
    if (!editId) return;
    if (!confirm('Delete this activity?')) return;
    acts = acts.filter(a=>a.id!==editId);
    save(); goSchedule();
  }

  render();
</script>
</body>
</html>
